<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Seed Reading Queue</title>
<style>body{font-family:system-ui;max-width:600px;margin:40px auto;padding:0 20px;background:#111;color:#eee}
h1{font-size:1.3em}p{line-height:1.5}#status{padding:12px;border-radius:8px;margin-top:20px}
.ok{background:#1a3a1a;color:#6f6}.err{background:#3a1a1a;color:#f66}</style>
</head>
<body>
<h1>Seed Reading Queue</h1>
<p>Loading articles into IndexedDB...</p>
<div id="status">Working...</div>
<script>
(async () => {
  const el = document.getElementById('status');
  const DB_NAME = 'reader';
  const STORE_NAME = 'articles';
  const DB_VERSION = 1;

  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function getAllArticles(db) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function putAllArticles(db, articles) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      for (const a of articles) store.put(a);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  try {
    const resp = await fetch('/seed-articles.json');
    if (!resp.ok) throw new Error('Failed to fetch seed-articles.json: ' + resp.status);
    const newArticles = await resp.json();

    const db = await openDb();

    // Migrate any leftover localStorage articles into IndexedDB first
    try {
      const lsRaw = localStorage.getItem('speedread_articles');
      if (lsRaw) {
        const lsArticles = JSON.parse(lsRaw);
        if (lsArticles.length > 0) await putAllArticles(db, lsArticles);
        localStorage.removeItem('speedread_articles');
      }
    } catch (_) { /* ignore corrupt localStorage */ }

    // Merge with existing articles (don't overwrite)
    const existing = await getAllArticles(db);
    const existingTitles = new Set(existing.map(a => a.title + '|' + a.group));
    let added = 0;
    const toAdd = [];
    for (const a of newArticles) {
      const key = a.title + '|' + a.group;
      if (!existingTitles.has(key)) {
        toAdd.push(a);
        existingTitles.add(key);
        added++;
      }
    }
    if (toAdd.length > 0) await putAllArticles(db, toAdd);

    el.className = 'ok';
    el.innerHTML = `Done! Added <strong>${added}</strong> articles (${newArticles.length - added} already existed).<br><br><a href="/" style="color:#6f6">Open Reader</a>`;
  } catch (e) {
    el.className = 'err';
    el.textContent = 'Error: ' + e.message;
  }
})();
</script>
</body>
</html>
